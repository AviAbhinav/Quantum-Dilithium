openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Quantum-Resistant Blockchain API using CRYSTALS-Dilithium signatures
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: keys
    description: Dilithium key operations
  - name: blockchain
    description: Blockchain operations
  - name: transactions
    description: Transaction operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /keys/generate:
    post:
      operationId: generateKeyPair
      tags: [keys]
      summary: Generate a Dilithium key pair
      description: Generates a new CRYSTALS-Dilithium post-quantum key pair
      responses:
        "200":
          description: Key pair generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyPair"

  /blockchain:
    get:
      operationId: getBlockchain
      tags: [blockchain]
      summary: Get the full blockchain
      description: Returns all blocks in the chain
      responses:
        "200":
          description: Blockchain data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockchainResponse"

  /blockchain/validate:
    get:
      operationId: validateBlockchain
      tags: [blockchain]
      summary: Validate the blockchain
      description: Verifies the integrity and all Dilithium signatures on chain
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResult"

  /blockchain/mine:
    post:
      operationId: mineBlock
      tags: [blockchain]
      summary: Mine a new block
      description: Mines a new block containing pending transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MineBlockRequest"
      responses:
        "200":
          description: Block mined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Block"
        "400":
          description: No pending transactions or invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/pending:
    get:
      operationId: getPendingTransactions
      tags: [transactions]
      summary: Get pending transactions
      description: Returns all transactions waiting to be mined
      responses:
        "200":
          description: Pending transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingTransactionsResponse"

  /transactions/submit:
    post:
      operationId: submitTransaction
      tags: [transactions]
      summary: Submit a signed transaction
      description: Submit a Dilithium-signed transaction to the pending pool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitTransactionRequest"
      responses:
        "200":
          description: Transaction accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          description: Invalid signature or request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/sign:
    post:
      operationId: signTransaction
      tags: [transactions]
      summary: Sign transaction data with a Dilithium private key
      description: Signs transaction payload with the provided Dilithium private key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignTransactionRequest"
      responses:
        "200":
          description: Signed transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignedTransactionResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    KeyPair:
      type: object
      properties:
        publicKey:
          type: string
          description: Hex-encoded Dilithium public key
        privateKey:
          type: string
          description: Hex-encoded Dilithium private key
        algorithm:
          type: string
          description: The post-quantum algorithm used
      required:
        - publicKey
        - privateKey
        - algorithm

    Transaction:
      type: object
      properties:
        id:
          type: string
        sender:
          type: string
          description: Sender public key (hex)
        recipient:
          type: string
          description: Recipient public key or address (hex)
        amount:
          type: number
        data:
          type: string
          description: Optional arbitrary data payload
        signature:
          type: string
          description: Dilithium signature (hex)
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - sender
        - recipient
        - amount
        - signature
        - timestamp

    Block:
      type: object
      properties:
        index:
          type: integer
        timestamp:
          type: string
          format: date-time
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        previousHash:
          type: string
        hash:
          type: string
        nonce:
          type: integer
        minerAddress:
          type: string
          description: Public key of the miner
      required:
        - index
        - timestamp
        - transactions
        - previousHash
        - hash
        - nonce
        - minerAddress

    BlockchainResponse:
      type: object
      properties:
        chain:
          type: array
          items:
            $ref: "#/components/schemas/Block"
        length:
          type: integer
        difficulty:
          type: integer
      required:
        - chain
        - length
        - difficulty

    ValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        message:
          type: string
        invalidBlocks:
          type: array
          items:
            type: integer
          description: Indices of invalid blocks (if any)
      required:
        - valid
        - message
        - invalidBlocks

    MineBlockRequest:
      type: object
      properties:
        minerAddress:
          type: string
          description: Public key of miner to receive reward
      required:
        - minerAddress

    SubmitTransactionRequest:
      type: object
      properties:
        sender:
          type: string
        recipient:
          type: string
        amount:
          type: number
        data:
          type: string
        signature:
          type: string
          description: Dilithium signature over the transaction payload (hex)
        publicKey:
          type: string
          description: Sender public key for signature verification (hex)
        timestamp:
          type: string
          format: date-time
      required:
        - sender
        - recipient
        - amount
        - signature
        - publicKey
        - timestamp

    SignTransactionRequest:
      type: object
      properties:
        sender:
          type: string
          description: Sender public key (hex)
        recipient:
          type: string
        amount:
          type: number
        data:
          type: string
        privateKey:
          type: string
          description: Sender Dilithium private key (hex) for signing
      required:
        - sender
        - recipient
        - amount
        - privateKey

    SignedTransactionResponse:
      type: object
      properties:
        sender:
          type: string
        recipient:
          type: string
        amount:
          type: number
        data:
          type: string
        signature:
          type: string
          description: Dilithium signature (hex)
        publicKey:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - sender
        - recipient
        - amount
        - signature
        - publicKey
        - timestamp

    TransactionResponse:
      type: object
      properties:
        success:
          type: boolean
        transactionId:
          type: string
        message:
          type: string
      required:
        - success
        - transactionId
        - message

    PendingTransactionsResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        count:
          type: integer
      required:
        - transactions
        - count

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
