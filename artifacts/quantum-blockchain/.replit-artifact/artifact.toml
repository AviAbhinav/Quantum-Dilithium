kind = "web"
previewPath = "/"
title = "Quantum-Resistant Blockchain"
version = "1.0.0"
id = "artifacts/quantum-blockchain"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25883

[services.development]
run = "pnpm --filter @workspace/quantum-blockchain run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quantum-blockchain", "run", "build" ]
publicDir = "artifacts/quantum-blockchain/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25883"
BASE_PATH = "/"
